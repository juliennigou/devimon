name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Check Rust build
        run: cargo check

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cloudflare/worker/package-lock.json

      - name: Install worker dependencies
        working-directory: cloudflare/worker
        run: npm ci

      - name: Apply D1 schema
        working-directory: cloudflare/worker
        run: npx wrangler d1 execute devimon --remote --file=./schema.sql

      - name: Deploy Worker
        working-directory: cloudflare/worker
        run: npx wrangler deploy

      - name: Deploy Pages site
        run: npx wrangler pages deploy ./cloudflare/site --project-name devimon-leaderboard --branch=main
