name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: devimon-macos-arm64
            binary_name: devimon
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: devimon-macos-x86_64
            binary_name: devimon
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: devimon-linux-x86_64
            binary_name: devimon
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: devimon-linux-arm64
            binary_name: devimon
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: devimon-windows-x86_64.exe
            binary_name: devimon.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install ARM64 Linux cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare binaries
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            cp "$dir/$name" "release-assets/$name"
            case "$name" in
              *.exe) ;;
              *) chmod +x "release-assets/$name" ;;
            esac
          done

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Devimon ${{ github.ref_name }}" \
            --generate-notes \
            release-assets/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
